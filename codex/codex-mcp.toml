[mcp_servers.context7]
command = "bunx"
args = [ "@upstash/context7-mcp" ]

[mcp_servers.fetch]
command = "uvx"
args = [ "mcp-server-fetch" ]

[mcp_servers.fs-projects]
command = "bunx"
args = [
  "@modelcontextprotocol/server-filesystem",
  "${env:DEV_PROJECTS_DIR}",
  "${env:OBSIDIAN_VAULT_DIR}",
  "${env:OBSIDIAN_BUSINESS_VAULT_DIR}",
  "${env:DEV_TOOLS_DIR}",
]

[mcp_servers.cms]
command = "bun"
args = [ "${env:CMS_MCP_ENTRY}" ]

[mcp_servers.cms.env]
CMS_URL = "${env:CMS_URL}"
CMS_API_KEY = "${env:CMS_API_KEY}"

[mcp_servers.stitch]
command = "bunx"
args = [ "@_davideast/stitch-mcp", "proxy" ]

[mcp_servers.stitch.env]
STITCH_API_KEY = "${env:STITCH_API_KEY}"
